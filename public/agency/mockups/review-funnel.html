<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Leave a Review</title>
<style>
  html { overflow: hidden; width: 100%; } * { margin: 0; padding: 0; box-sizing: border-box; }
  
  html, body { width: 100%; position: relative; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #fff; color: #111; overflow-x: hidden; }

  .top-bar { height: 44px; background: #fff; }

  .content { padding: 48px 24px 0; text-align: center; }
  .avatar { width: 80px; height: 80px; border-radius: 50%; background: #0f172a; display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
  .avatar span { color: #e63946; font-size: 32px; font-weight: 900; }

  h1 { font-size: 26px; font-weight: 800; line-height: 1.25; margin-bottom: 8px; color: #111; }
  .biz { color: #e63946; }
  .subtitle { font-size: 15px; color: #94a3b8; margin-bottom: 40px; }

  .stars { display: flex; justify-content: center; gap: 12px; margin-bottom: 12px; }
  .star { font-size: 56px; color: #fbbf24; line-height: 1; filter: drop-shadow(0 2px 4px rgba(251,191,36,0.3)); }

  .rating-label { font-size: 18px; font-weight: 800; color: #111; margin-bottom: 36px; }

  .success { background: #f0fdf4; border: 2px solid #86efac; border-radius: 14px; padding: 24px; margin-bottom: 24px; }
  .success-icon { font-size: 28px; margin-bottom: 8px; }
  .success h3 { font-size: 16px; font-weight: 800; color: #166534; margin-bottom: 4px; }
  .success p { font-size: 13px; color: #22c55e; }

  .google-btn { display: block; width: 100%; background: #0f172a; color: #fff; font-size: 17px; font-weight: 800; padding: 18px; border-radius: 10px; text-align: center; text-decoration: none; margin-bottom: 36px; }
  .google-btn .g { color: #4285f4; margin-right: 8px; font-size: 20px; }

  .divider { width: 48px; height: 3px; background: #e63946; margin: 0 auto 20px; border-radius: 2px; }
  .powered { font-size: 11px; color: #cbd5e1; }
  .powered strong { color: #94a3b8; }
</style>
</head>
<body>
  <div class="top-bar"></div>
  <div class="content">
    <div class="avatar"><span>A</span></div>
    <h1>How was your experience with <span class="biz">Athens Plumbing Co</span>?</h1>
    <p class="subtitle">We'd love to hear your feedback</p>
    <div class="stars">
      <span class="star">&#9733;</span>
      <span class="star">&#9733;</span>
      <span class="star">&#9733;</span>
      <span class="star">&#9733;</span>
      <span class="star">&#9733;</span>
    </div>
    <div class="rating-label">Excellent!</div>
    <div class="success">
      <div class="success-icon">&#10003;</div>
      <h3>Thank you for your 5-star rating!</h3>
      <p>You'll be redirected to Google to leave your review</p>
    </div>
    <a class="google-btn"><span class="g">G</span> Leave a Review on Google</a>
    <div class="divider"></div>
    <p class="powered">Powered by <strong>Sharpe Systems</strong></p>
  </div>
</body>
</html>
